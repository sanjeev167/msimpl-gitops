# =============================================================================
# Argo CD Application Manifest
# =============================================================================
# File        : ms-notification-application.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Application : ms-notification
# Namespace   : argocd
# Resource    : Argo CD Application
#
# Purpose
# -----------------------------------------------------------------------------
# Registers the Notification microservice with Argo CD for GitOps deployment
# and continuous reconciliation in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This Argo CD Application defines the GitOps entry point for the Notification
# microservice.
#
# It tells Argo CD:
#
#   • Which Git repository contains the Kubernetes manifests.
#   • Which Git branch to monitor.
#   • Which environment-specific Kustomization to build.
#   • Which Kubernetes cluster to deploy to.
#   • Which Kubernetes namespace to deploy into.
#
# During synchronization, Argo CD builds the Kustomization located at:
#
#     kubernetes/environments/dev/ms-notification
#
# The Notification Kustomization assembles:
#
#   • Namespace
#   • Ingress
#   • ConfigMaps
#   • Secret
#   • Shared Deployment
#   • Shared Service
#
# The Deployment and Service are maintained separately under:
#
#     kubernetes/applications/ms-notification
#
# This architecture allows the application manifests to remain reusable across
# Development, QA, UAT and Production while each environment supplies its own
# configuration.
#
#
# GitOps Deployment Flow
# -----------------------------------------------------------------------------
#
# Developer
#      │
#      ▼
# Git Push
#      │
#      ▼
# GitHub Actions
#      │
#      ▼
# Docker Image Published
#      │
#      ▼
# GitHub Actions updates deployment.yaml
#      │
#      ▼
# GitOps Repository
#      │
#      ▼
# Argo CD Application
#      │
#      ▼
# kubernetes/environments/dev/ms-notification
#      │
#      ▼
# Kustomization Build
#      │
#      ├── Namespace
#      ├── Ingress
#      ├── ConfigMaps
#      ├── Secret
#      └── Shared Application
#             ├── Deployment
#             └── Service
#      │
#      ▼
# Kubernetes Cluster
#      │
#      ▼
# Rolling Deployment
#
#
# Notes
# -----------------------------------------------------------------------------
# • This file defines ONLY the Argo CD Application.
# • The actual Kubernetes resources are assembled by the Notification
#   Kustomization.
# • During Module 4 the application uses Manual Synchronization.
# • Automatic Sync, Self-Heal and Prune will be enabled during Module 5.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Argo CD 2.x+
# - Kustomize
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
#
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:

  # ---------------------------------------------------------------------------
  # Argo CD Application Name
  #
  # Displayed in the Argo CD Web UI.
  # ---------------------------------------------------------------------------
  name: ms-notification

  # ---------------------------------------------------------------------------
  # Namespace where the Argo CD Application CR is stored.
  #
  # NOTE:
  # This is NOT the namespace where the Notification application is deployed.
  # ---------------------------------------------------------------------------
  namespace: argocd

spec:

  # ---------------------------------------------------------------------------
  # Argo CD Project
  # ---------------------------------------------------------------------------
  project: default

  source:

    # -------------------------------------------------------------------------
    # GitOps Repository
    # -------------------------------------------------------------------------
    repoURL: https://github.com/sanjeev167/msimpl-gitops.git

    # -------------------------------------------------------------------------
    # Git Branch
    # -------------------------------------------------------------------------
    targetRevision: main

    # -------------------------------------------------------------------------
    # Environment-specific Notification Kustomization
    # -------------------------------------------------------------------------
    path: kubernetes/environments/dev/ms-notification

  destination:

    # -------------------------------------------------------------------------
    # Target Kubernetes Cluster
    # -------------------------------------------------------------------------
    server: https://kubernetes.default.svc

    # -------------------------------------------------------------------------
    # Target Namespace
    #
    # This namespace matches the Namespace created by:
    #
    #     environments/dev/ms-notification/namespace.yaml
    # -------------------------------------------------------------------------
    namespace: msimpl

  # ---------------------------------------------------------------------------
  # Synchronization Policy
  #
  # Module 4
  #   • Manual Synchronization
  #
  # Module 5
  #   • Automated Synchronization
  #   • Self Heal
  #   • Prune
  # ---------------------------------------------------------------------------

  # syncPolicy: {}