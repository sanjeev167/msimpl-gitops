# Project     : MSIMPL - Microservices Platform
# Application : ms-transaction-orchestrator
# Namespace   : argocd
# Resource    : Argo CD Application
# Purpose     : Registers the Transaction Orchestrator microservice with Argo CD
#               for GitOps deployment and continuous reconciliation.
