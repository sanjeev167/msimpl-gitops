# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ms-transaction-orchestrator
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/sanjeev167/msimpl-gitops.git
    targetRevision: main
    path: kubernetes/applications/ms-transaction-orchestrator

  destination:
    server: https://kubernetes.default.svc
    namespace: msimpl

  syncPolicy: {}