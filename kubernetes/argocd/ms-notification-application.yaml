# =============================================================================
# Argo CD Application Manifest
# =============================================================================
# File        : ms-notification-application.yaml
# Project     : MSIMPL - Microservices Platform
# Application : ms-notification
# Namespace   : argocd
# Resource    : Argo CD Application
# Purpose     : Registers the Notification microservice with Argo CD for GitOps
#               deployment and continuous reconciliation.
#
# Version     : 1.1.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ms-notification
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/sanjeev167/msimpl-gitops.git
    targetRevision: main
    path: kubernetes/applications/ms-notification

  destination:
    server: https://kubernetes.default.svc
    namespace: msimpl

  syncPolicy: {}