# =============================================================================
# Kubernetes Secret Manifest
# =============================================================================
# File        : secret.yaml
# Project     : MSIMPL - Microservices Platform
# Namespace   : msimpl
# Resource    : Secret (Opaque)
# Purpose     : Stores sensitive configuration shared across MSIMPL
#               microservices.
#
# Description
# -----------------------------------------------------------------------------
# This Secret contains sensitive application configuration that should never
# be stored in ConfigMaps.
#
# Typical examples include:
#
#   • Database usernames and passwords
#   • API keys
#   • Authentication tokens
#   • Encryption keys
#   • Third-party credentials
#
# The Deployment references this Secret using:
#
#     envFrom:
#       secretRef:
#         name: msimpl-secret
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This manifest is maintained in the MSIMPL GitOps repository.
# - For local development, placeholder credentials are acceptable.
# - Before deploying to QA, UAT or Production, replace these values with
#   environment-specific credentials.
# - In production, prefer an external secret management solution instead of
#   storing secrets directly in Git.
#
# Security Notes
# -----------------------------------------------------------------------------
# - stringData is automatically converted into Base64-encoded data by
#   Kubernetes.
# - Base64 is NOT encryption.
# - Restrict RBAC permissions so only authorized workloads and users can
#   access Secrets.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Local Kubernetes (Kind / Docker Desktop)
# - GitHub Actions
# - Argo CD
# - Amazon EKS
#
# Version     : 1.1.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: Secret

metadata:

  # ---------------------------------------------------------------------------
  # Secret Name
  #
  # Referenced by all MSIMPL Deployments.
  # ---------------------------------------------------------------------------
  name: msimpl-secret

  namespace: msimpl

  labels:

    # Standard Kubernetes labels
    app.kubernetes.io/name: msimpl
    app.kubernetes.io/component: application-secret
    app.kubernetes.io/part-of: microservices-platform

# -----------------------------------------------------------------------------
# Opaque is the default Secret type for user-defined key/value pairs.
# -----------------------------------------------------------------------------
type: Opaque

# -----------------------------------------------------------------------------
# stringData
#
# Kubernetes automatically converts these values into the 'data' section
# using Base64 encoding during resource creation.
#
# Use stringData because it is human-readable and easier to maintain.
# -----------------------------------------------------------------------------
stringData:

  # ---------------------------------------------------------------------------
  # Database Credentials
  #
  # These values are consumed by Spring Boot using environment variables.
  # ---------------------------------------------------------------------------

  DB_USERNAME: "postgres"

  DB_PASSWORD: "postgres"