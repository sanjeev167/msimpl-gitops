# =============================================================================
# Kubernetes Secret
# =============================================================================
# File        : secret.yaml
# Project     : MSIMPL - Microservices Platform
# Purpose     : Stores sensitive configuration shared across MSIMPL microservices
# Namespace   : msimpl
# Version     : 1.0.0
# =============================================================================
#
# Notes
# -----
# - Stores sensitive configuration only.
# - Do not store non-sensitive values in this Secret.
# - Kubernetes automatically Base64 encodes values defined under stringData.
# - Replace placeholder values with environment-specific credentials before
#   deploying to shared or production environments.
#
# =============================================================================

apiVersion: v1
kind: Secret

metadata:
  name: msimpl-secret
  namespace: msimpl

  labels:
    app.kubernetes.io/name: msimpl
    app.kubernetes.io/component: application-secret
    app.kubernetes.io/part-of: microservices-platform

type: Opaque

stringData:

  # ---------------------------------------------------------------------------
  # Database Credentials
  # ---------------------------------------------------------------------------

  DB_USERNAME: "postgres"

  DB_PASSWORD: "postgres"