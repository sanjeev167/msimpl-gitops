# =============================================================================
# Kubernetes ConfigMap
# =============================================================================
# File        : config-map-common.yaml
# Project     : MSIMPL - Microservices Platform
# Purpose     : Common non-sensitive configuration shared by all microservices
# Namespace   : msimpl
# Version     : 1.0.0
# =============================================================================
#
# Notes
# -----
# - Stores common Spring Boot configuration.
# - Do not store passwords, tokens or API keys.
# - Sensitive values belong in Kubernetes Secrets.
#
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:
  name: msimpl-common-config
  namespace: msimpl

  labels:
    app.kubernetes.io/name: msimpl
    app.kubernetes.io/component: common-config
    app.kubernetes.io/part-of: microservices-platform

data:

  LOG_LEVEL_ROOT: "INFO"