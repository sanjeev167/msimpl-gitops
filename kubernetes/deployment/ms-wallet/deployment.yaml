# =============================================================================
# Kubernetes Deployment Manifest
# =============================================================================
# File        : deployment.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-wallet
# Namespace   : msimpl
# Resource    : Deployment
# Purpose     : Deploys the Wallet microservice into the Kubernetes cluster.
#
# Description
# -----------------------------------------------------------------------------
# This Deployment defines the desired runtime state of the ms-wallet
# microservice. It specifies:
#
#   - Number of Pod replicas
#   - Docker image to deploy
#   - Resource requests and limits
#   - Startup, Readiness and Liveness probes
#   - Environment configuration using ConfigMaps and Secrets
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This manifest is maintained in the MSIMPL GitOps repository.
# - GitHub Actions updates only the Docker image tag after publishing
#   a new image to Docker Hub.
# - Argo CD continuously monitors this file and reconciles the live
#   Kubernetes cluster with the desired state defined here.
# - Do not manually edit the image tag in the Kubernetes cluster.
#   All deployment changes should originate from this manifest.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Local Kubernetes (Docker Desktop / Kind)
# - GitHub Actions
# - Argo CD
# - Amazon EKS
#
# Version     : 2.0.0
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: ms-wallet
  namespace: msimpl
  labels:
    app: ms-wallet

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ms-wallet

  template:
    metadata:
      labels:
        app: ms-wallet

    spec:
      containers:
        - name: ms-wallet

          # GitHub Actions automatically updates this image tag.
          image: sanjeev777/ms-wallet:v0.0.1-SNAPSHOT

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: msimpl-common-config

            - configMapRef:
                name: ms-wallet-db-config

            - configMapRef:
                name: msimpl-kafka-config

            - configMapRef:
                name: msimpl-observability-config

            - secretRef:
                name: msimpl-secret

          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"

            limits:
              cpu: "500m"
              memory: "768Mi"

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
