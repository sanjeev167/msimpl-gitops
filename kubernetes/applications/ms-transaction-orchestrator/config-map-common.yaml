# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-common.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-transaction-orchestrator
# Namespace   : msimpl
# Resource    : ConfigMap
# Purpose     : Stores non-sensitive configuration specific to the Transaction
#               Orchestrator microservice.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains common application configuration consumed only by
# the Transaction Orchestrator microservice.
#
# Typical examples include:
#
#   • Logging configuration
#   • Transaction Orchestrator-specific feature flags
#   • Default application settings
#   • Environment variables
#
# This ConfigMap must NEVER contain:
#
#   • Passwords
#   • API Keys
#   • Tokens
#   • Certificates
#
# Sensitive information belongs in Kubernetes Secrets.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This manifest is maintained in the MSIMPL GitOps repository.
# - Argo CD continuously monitors this ConfigMap and reconciles the
#   cluster with the desired state stored in Git.
# - Any modification should be committed to Git rather than editing the
#   ConfigMap directly inside Kubernetes.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Local Kubernetes (Docker Desktop / Kind)
# - GitHub Actions
# - Argo CD
# - Amazon EKS
#
# Version     : 2.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by Deployment:
  #
  # envFrom:
  #   configMapRef:
  #     name: ms-transaction-common-config
  # ---------------------------------------------------------------------------
  name: ms-transaction-common-config

  namespace: msimpl

  labels:

    app.kubernetes.io/name: ms-transaction-orchestrator
    app.kubernetes.io/component: common-config
    app.kubernetes.io/part-of: msimpl-platform

data:

  # ---------------------------------------------------------------------------
  # Default Root Logging Level
  #
  # Spring Boot reads this as an environment variable.
  # ---------------------------------------------------------------------------
  LOG_LEVEL_ROOT: "INFO"