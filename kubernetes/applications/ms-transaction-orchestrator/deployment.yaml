# =============================================================================
# Kubernetes Deployment
# =============================================================================
# File        : deployment.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-transaction-orchestrator
# Namespace   : msimpl
# Purpose     : Deploy the Transaction Orchestrator microservice
# Version     : 1.0.0
# =============================================================================
#
# Notes
# -----
# - Uses ConfigMaps and Secrets for externalized configuration.
# - Configured for local Kind Kubernetes.
# - Compatible with GitHub Actions, Argo CD and AWS EKS.
#
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: ms-transaction-orchestrator
  namespace: msimpl

  labels:
    app: ms-transaction-orchestrator

spec:

  replicas: 1

  selector:
    matchLabels:
      app: ms-transaction-orchestrator

  template:

    metadata:
      labels:
        app: ms-transaction-orchestrator

    spec:

      containers:

        - name: ms-transaction-orchestrator

          image: sanjeev777/msimpl_dochub:ms-transaction-orchestrator-1.0

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8082

          envFrom:

            - configMapRef:
                name: msimpl-common-config

            - configMapRef:
                name: ms-transaction-db-config

            - configMapRef:
                name: msimpl-kafka-config

            - configMapRef:
                name: msimpl-observability-config

            - secretRef:
                name: msimpl-secret

          resources:

            requests:
              cpu: "200m"
              memory: "384Mi"

            limits:
              cpu: "500m"
              memory: "768Mi"

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3