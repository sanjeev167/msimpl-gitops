# =============================================================================
# Kubernetes Deployment Manifest
# =============================================================================
# File        : deployment.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-transaction-orchestrator
# Resource    : Deployment
#
# Purpose
# -----------------------------------------------------------------------------
# Defines the common Deployment for the Transaction Orchestrator microservice.
#
# This Deployment is environment-independent and is reused across
# Development, QA, UAT and Production.
#
# Environment-specific configuration such as:
#
#   - Namespace
#   - Database Configuration
#   - Kafka Configuration
#   - Secrets
#   - Ingress
#
# is supplied from:
#
# kubernetes/environments/<environment>/
#
# Description
# -----------------------------------------------------------------------------
# This Deployment defines the desired runtime state of the
# Transaction Orchestrator microservice.
#
# It specifies:
#
#   - Desired Pod replicas
#   - Rolling Update deployment strategy
#   - Docker image
#   - Resource requests & limits
#   - Startup, Readiness and Liveness probes
#   - ConfigMaps and Secrets
#   - Graceful application shutdown
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This Deployment is common for all environments.
# - GitHub Actions updates ONLY the Docker image tag after publishing
#   a new image to Docker Hub.
# - Argo CD deploys this Deployment using the configuration supplied
#   by the selected environment.
# - Never modify this resource directly inside the Kubernetes cluster.
#   All deployment changes must originate from Git.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-transaction-orchestrator
  labels:
    app: ms-transaction-orchestrator
spec:
  # ---------------------------------------------------------------------------
  # Desired number of Pod replicas.
  #
  # Environment-specific replica counts may be overridden later through
  # Kustomize overlays without modifying this Deployment.
  # ---------------------------------------------------------------------------
  replicas: 1
  # ---------------------------------------------------------------------------
  # Number of previous ReplicaSets retained for rollback.
  # ---------------------------------------------------------------------------
  revisionHistoryLimit: 5
  # ---------------------------------------------------------------------------
  # Rolling Update Strategy
  # ---------------------------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ms-transaction-orchestrator
  template:
    metadata:
      labels:
        app: ms-transaction-orchestrator
    spec:
      # -----------------------------------------------------------------------
      # Allow Spring Boot to shut down gracefully before Pod termination.
      # -----------------------------------------------------------------------
      terminationGracePeriodSeconds: 30
      containers:
        - name: ms-transaction-orchestrator
          # -------------------------------------------------------------------
          # GitHub Actions automatically updates ONLY the image tag.
          # The same Docker image is deployed to all environments.
          # -------------------------------------------------------------------
          image: sanjeev777/ms-transaction-orchestrator:v0.0.1-SNAPSHOT-fc224fa
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          # -------------------------------------------------------------------
          # Environment Configuration
          #
          # The ConfigMaps and Secrets referenced below are supplied by the
          # selected deployment environment (Dev / QA / UAT / Prod).
          #
          # Their names remain identical across environments while their
          # contents differ.
          # -------------------------------------------------------------------
          envFrom:
            # Common Configuration
            - configMapRef:
                name: ms-transaction-common-config
            # Database Configuration
            - configMapRef:
                name: ms-transaction-db-config
            # Kafka Configuration
            - configMapRef:
                name: ms-transaction-kafka-config
            # Observability Configuration
            - configMapRef:
                name: ms-transaction-observability-config
            # Sensitive Configuration
            - secretRef:
                name: msimpl-secret
          # -------------------------------------------------------------------
          # Resource Requests & Limits
          # -------------------------------------------------------------------
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          # -------------------------------------------------------------------
          # Startup Probe
          # -------------------------------------------------------------------
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          # -------------------------------------------------------------------
          # Readiness Probe
          # -------------------------------------------------------------------
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # -------------------------------------------------------------------
          # Liveness Probe
          # -------------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
