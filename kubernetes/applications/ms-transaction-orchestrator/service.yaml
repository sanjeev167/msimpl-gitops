# =============================================================================
# Kubernetes Service Manifest
# =============================================================================
# File        : service.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-transaction-orchestrator
# Resource    : Service (ClusterIP)
#
# Purpose
# -----------------------------------------------------------------------------
# Defines the common Kubernetes Service for the Transaction Orchestrator
# microservice.
#
# This Service is environment-independent and is reused across
# Development, QA, UAT, and Production.
#
# Description
# -----------------------------------------------------------------------------
# This Service provides a stable internal network endpoint for the
# Transaction Orchestrator microservice.
#
# Responsibilities
# -----------------------------------------------------------------------------
# • Load balances traffic across all healthy Transaction Orchestrator Pods.
# • Provides stable DNS-based service discovery.
# • Enables communication between Kubernetes microservices.
# • Acts as the backend Service for the Transaction Orchestrator Ingress.
#
# Service Discovery
# -----------------------------------------------------------------------------
# Kubernetes automatically creates a DNS entry for this Service.
#
# Within the same namespace, other microservices can communicate using:
#
#     http://ms-transaction-orchestrator:8082
#
# For cross-namespace communication, Kubernetes provides the fully qualified
# DNS name:
#
#     ms-transaction-orchestrator.<namespace>.svc.cluster.local
#
# GitOps Notes
# -----------------------------------------------------------------------------
# • This Service is shared across all deployment environments.
# • Argo CD continuously reconciles the live Service with the desired state
#   stored in the GitOps repository.
# • Never modify this Service directly in the Kubernetes cluster.
# • All changes must originate from the GitOps repository.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 2.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: Service

metadata:

  name: ms-transaction-orchestrator

  labels:

    app: ms-transaction-orchestrator
    app.kubernetes.io/name: ms-transaction-orchestrator
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/managed-by: argocd

spec:

  # ---------------------------------------------------------------------------
  # Service Type
  #
  # ClusterIP exposes the application only within the Kubernetes cluster.
  #
  # External traffic is routed through the Ingress Controller.
  # ---------------------------------------------------------------------------
  type: ClusterIP

  # ---------------------------------------------------------------------------
  # Pod Selector
  #
  # Routes traffic to Pods with:
  #
  #     app=ms-transaction-orchestrator
  #
  # This selector must match the labels defined in deployment.yaml.
  # ---------------------------------------------------------------------------
  selector:

    app: ms-transaction-orchestrator

  ports:

    # -------------------------------------------------------------------------
    # Service Port Mapping
    #
    # port
    #   Port exposed by the Kubernetes Service.
    #
    # targetPort
    #   Container port exposed by the Transaction Orchestrator application.
    # -------------------------------------------------------------------------
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082