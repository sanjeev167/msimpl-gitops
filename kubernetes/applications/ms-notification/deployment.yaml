# =============================================================================
# Kubernetes Deployment Manifest
# =============================================================================
# File        : deployment.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-notification
# Namespace   : msimpl
# Resource    : Deployment
# Purpose     : Deploys the Notification microservice into the Kubernetes cluster.
#
# Description
# -----------------------------------------------------------------------------
# This Deployment defines the desired runtime state of the ms-notification
# microservice. It specifies:
#
#   - Number of Pod replicas
#   - Rolling update deployment strategy
#   - Docker image to deploy
#   - Resource requests and limits
#   - Startup, Readiness and Liveness probes
#   - Environment configuration using ConfigMaps and Secrets
#   - Graceful application shutdown
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This manifest is maintained in the MSIMPL GitOps repository.
# - GitHub Actions updates ONLY the Docker image tag after publishing
#   a new image to Docker Hub.
# - Argo CD continuously monitors this manifest and reconciles the
#   Kubernetes cluster with the desired state defined here.
# - Never edit this Deployment directly inside the Kubernetes cluster.
#   All deployment changes must originate from Git.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Local Kubernetes (Docker Desktop / Kind)
# - GitHub Actions
# - Argo CD
# - Amazon EKS
#
# Version     : 2.2.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: ms-notification
  namespace: msimpl

  labels:
    app: ms-notification

spec:

  # ---------------------------------------------------------------------------
  # Number of desired application replicas.
  # Increase in production for High Availability.
  # ---------------------------------------------------------------------------
  replicas: 1

  # ---------------------------------------------------------------------------
  # Number of previous ReplicaSets retained for rollback.
  # ---------------------------------------------------------------------------
  revisionHistoryLimit: 5

  # ---------------------------------------------------------------------------
  # Deployment Strategy
  #
  # RollingUpdate ensures zero/minimal downtime deployment.
  # ---------------------------------------------------------------------------
  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: ms-notification

  template:

    metadata:
      labels:
        app: ms-notification

    spec:

      # -----------------------------------------------------------------------
      # Allow Spring Boot to shut down gracefully before Pod termination.
      # -----------------------------------------------------------------------
      terminationGracePeriodSeconds: 30

      containers:

        - name: ms-notification

          # -------------------------------------------------------------------
          # GitHub Actions automatically updates ONLY this image tag.
          #
          # Example:
          #   sanjeev777/ms-notification:v0.0.1-SNAPSHOT-cfbb062
          # -------------------------------------------------------------------
          image: sanjeev777/ms-notification:v0.0.1-SNAPSHOT-15bb774

          # -------------------------------------------------------------------
          # Always pull image from Docker Hub.
          # -------------------------------------------------------------------
          imagePullPolicy: Always

          ports:

            - containerPort: 8081

          # -------------------------------------------------------------------
          # Environment Variables
          #
          # Notification-specific ConfigMaps
          # -------------------------------------------------------------------
          envFrom:

            # Notification Common Configuration
            - configMapRef:
                name: ms-notification-common-config

            # Notification Database Configuration
            - configMapRef:
                name: ms-notification-db-config

            # Notification Kafka Configuration
            - configMapRef:
                name: ms-notification-kafka-config

            # Notification Observability Configuration
            - configMapRef:
                name: ms-notification-observability-config

            # Notification Secret
            # (Currently shared. Can later be renamed to
            # ms-notification-secret.)
            - secretRef:
                name: msimpl-secret

          # -------------------------------------------------------------------
          # Resource Requests & Limits
          # -------------------------------------------------------------------
          resources:

            requests:
              cpu: "200m"
              memory: "384Mi"

            limits:
              cpu: "500m"
              memory: "768Mi"

          # -------------------------------------------------------------------
          # Startup Probe
          # -------------------------------------------------------------------
          startupProbe:

            httpGet:
              path: /actuator/health
              port: 8081

            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          # -------------------------------------------------------------------
          # Readiness Probe
          # -------------------------------------------------------------------
          readinessProbe:

            httpGet:
              path: /actuator/health/readiness
              port: 8081

            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # -------------------------------------------------------------------
          # Liveness Probe
          # -------------------------------------------------------------------
          livenessProbe:

            httpGet:
              path: /actuator/health/liveness
              port: 8081

            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3