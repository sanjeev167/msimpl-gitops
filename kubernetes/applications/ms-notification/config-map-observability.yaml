# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-observability.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-notification
# Namespace   : msimpl
# Resource    : ConfigMap
# Purpose     : Stores non-sensitive observability configuration specific to the
#               Notification microservice.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains observability configuration consumed only by the
# Notification microservice.
#
# Typical configuration includes:
#
#   • Spring Boot Actuator settings
#   • Health endpoint configuration
#   • Prometheus metrics configuration
#   • Monitoring-related environment variables
#
# Logging configuration is maintained separately in:
#
#     config-map-common.yaml
#
# Sensitive information such as:
#
#   • Monitoring API Keys
#   • Authentication Tokens
#   • SSL Certificates
#
# must NEVER be stored here.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This manifest is maintained in the MSIMPL GitOps repository.
# - Argo CD continuously reconciles this ConfigMap with Git.
# - Any observability configuration change should be committed to Git.
# - Changes automatically propagate to newly created Pods.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Spring Boot Actuator
# - Prometheus
# - Local Kubernetes (Docker Desktop / Kind)
# - GitHub Actions
# - Argo CD
# - Amazon EKS
#
# Version     : 2.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by Deployment:
  #
  # envFrom:
  #   configMapRef:
  #     name: ms-notification-observability-config
  # ---------------------------------------------------------------------------
  name: ms-notification-observability-config

  namespace: msimpl

  labels:

    app.kubernetes.io/name: ms-notification
    app.kubernetes.io/component: observability-config
    app.kubernetes.io/part-of: msimpl-platform

data:

  # ---------------------------------------------------------------------------
  # Spring Boot Actuator
  #
  # Exposes actuator endpoints for health monitoring and metrics.
  # ---------------------------------------------------------------------------

  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"

  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"

  # ---------------------------------------------------------------------------
  # Prometheus Metrics
  #
  # Enables Prometheus metrics endpoint for monitoring.
  # ---------------------------------------------------------------------------

  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"