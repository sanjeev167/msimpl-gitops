# =============================================================================
# Kubernetes ConfigMap
# =============================================================================
# File        : config-map-observability.yaml
# Project     : MSIMPL - Microservices Platform
# Purpose     : Shared non-sensitive observability configuration
# Namespace   : msimpl
# Version     : 1.0.0
# =============================================================================
#
# Notes
# -----
# - Stores shared Spring Boot Actuator and Prometheus settings.
# - Logging configuration is maintained in config-map-common.yaml.
# - Sensitive values belong in Kubernetes Secrets.
#
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:
  name: msimpl-observability-config
  namespace: msimpl

  labels:
    app.kubernetes.io/name: msimpl
    app.kubernetes.io/component: observability-config
    app.kubernetes.io/part-of: microservices-platform

data:

  # ---------------------------------------------------------------------------
  # Spring Boot Actuator
  # ---------------------------------------------------------------------------

  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"

  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"

  # ---------------------------------------------------------------------------
  # Prometheus Metrics
  # ---------------------------------------------------------------------------

  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"