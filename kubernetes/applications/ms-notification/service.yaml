# =============================================================================
# Kubernetes Service Manifest
# =============================================================================
# File        : service.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-notification
# Resource    : Service (ClusterIP)
#
# Purpose
# -----------------------------------------------------------------------------
# Defines the common Kubernetes Service for the Notification microservice.
#
# This Service is environment-independent and is reused across
# Development, QA, UAT and Production.
#
#
# Description
# -----------------------------------------------------------------------------
# This Service provides a stable internal network endpoint for the
# Notification microservice.
#
# Responsibilities
# -----------------------------------------------------------------------------
# • Load balances traffic across all healthy Notification Pods.
# • Provides stable DNS-based service discovery.
# • Enables communication between Kubernetes microservices.
# • Acts as the backend Service for the Notification Ingress.
#
#
# Service Discovery
# -----------------------------------------------------------------------------
# Kubernetes automatically creates a DNS entry for this Service.
#
# Within the same namespace:
#
#     http://ms-notification-service:8081
#
# Across namespaces:
#
#     ms-notification-service.<namespace>.svc.cluster.local
#
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This Service is shared across all deployment environments.
# - Environment-specific configuration is supplied by the selected
#   Kustomization.
# - Argo CD continuously reconciles this Service with the desired state
#   stored in the GitOps repository.
# - Never modify this Service directly inside Kubernetes.
#   All changes must originate from Git.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: Service

metadata:

  # ---------------------------------------------------------------------------
  # Service Name
  #
  # Referenced by:
  #
  #   ingress.yaml
  #
  # ---------------------------------------------------------------------------
  name: ms-notification-service

  labels:

    app.kubernetes.io/name: ms-notification
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: msimpl-platform

spec:

  # ---------------------------------------------------------------------------
  # Service Type
  #
  # ClusterIP exposes the application only inside the Kubernetes cluster.
  # External traffic reaches this Service through the Ingress Controller.
  # ---------------------------------------------------------------------------
  type: ClusterIP

  # ---------------------------------------------------------------------------
  # Pod Selector
  #
  # Routes traffic to Pods created by:
  #
  #     ms-notification-deployment
  # ---------------------------------------------------------------------------
  selector:

    app.kubernetes.io/name: ms-notification

  ports:

    # -------------------------------------------------------------------------
    # HTTP Service Port
    # -------------------------------------------------------------------------
    - name: http
      protocol: TCP
      port: 8081
      targetPort: 8081