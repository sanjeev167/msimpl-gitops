# =============================================================================
# Kubernetes ConfigMap
# =============================================================================
# File        : config-map-kafka.yaml
# Project     : MSIMPL - Microservices Platform
# Purpose     : Shared non-sensitive Kafka configuration
# Namespace   : msimpl
# Version     : 1.0.0
# =============================================================================
#
# Notes
# -----
# - Stores shared Kafka connection properties.
# - Do not store usernames, passwords or credentials.
# - Sensitive values belong in Kubernetes Secrets.
# - Service-specific Kafka properties remain in each
#   microservice's application-kafka.yml.
#
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:
  name: msimpl-kafka-config
  namespace: msimpl

  labels:
    app.kubernetes.io/name: msimpl
    app.kubernetes.io/component: kafka-config
    app.kubernetes.io/part-of: microservices-platform

data:

  # ---------------------------------------------------------------------------
  # Kafka Connection
  # ---------------------------------------------------------------------------

  KAFKA_HOST: "host.docker.internal"

  KAFKA_PORT: "9092"

  # ---------------------------------------------------------------------------
  # Consumer Configuration
  # ---------------------------------------------------------------------------

  KAFKA_AUTO_OFFSET_RESET: "earliest"

  KAFKA_ENABLE_AUTO_COMMIT: "false"

  # ---------------------------------------------------------------------------
  # Producer Configuration
  # ---------------------------------------------------------------------------

  KAFKA_ACKS: "all"

  KAFKA_RETRIES: "3"