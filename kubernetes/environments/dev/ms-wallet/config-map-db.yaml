# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-db.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-wallet
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores Development environment-specific, non-sensitive database
# configuration consumed exclusively by the Wallet microservice.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains the database connection properties required by the
# Wallet microservice to connect to its PostgreSQL database.
#
# Typical examples include:
#
#   • Database Host
#   • Database Port
#   • Database Name
#
# This ConfigMap MUST NEVER contain:
#
#   • Database Username
#   • Database Password
#   • SSL Certificates
#   • Database Tokens
#
# Sensitive information must always be stored in a Kubernetes Secret.
#
# Database credentials are provided by:
#
#     Secret:
#         ms-wallet-secret
#
# This ConfigMap is referenced by the Wallet Deployment using:
#
#     envFrom:
#       configMapRef:
#         name: ms-wallet-db-config
#
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This ConfigMap belongs exclusively to the Wallet microservice in the
#   Development environment.
# - It is deployed through the Wallet service Kustomization located at:
#
#       kubernetes/environments/dev/ms-wallet
#
# - Argo CD continuously reconciles this ConfigMap with the desired state
#   stored in the GitOps repository.
# - Never modify this ConfigMap directly inside the Kubernetes cluster.
#   All configuration changes must originate from Git.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
#
# Version     : 4.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-wallet-db-config
  # ---------------------------------------------------------------------------
  name: ms-wallet-db-config

  labels:

    app.kubernetes.io/name: ms-wallet
    app.kubernetes.io/component: database-config
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/environment: dev


# -----------------------------------------------------------------------------
# Non-sensitive Database Configuration
#
# Spring Boot automatically maps these environment variables to the
# corresponding application properties.
# -----------------------------------------------------------------------------
data:

  # ---------------------------------------------------------------------------
  # Database Host
  #
  # Hostname or IP address of the PostgreSQL server.
  #
  # Spring Property:
  #     spring.datasource.url
  # ---------------------------------------------------------------------------
  DB_HOST: "host.docker.internal"

  # ---------------------------------------------------------------------------
  # Database Port
  #
  # PostgreSQL default port.
  # ---------------------------------------------------------------------------
  DB_PORT: "5432"

  # ---------------------------------------------------------------------------
  # Database Name
  #
  # Development database dedicated to the Wallet microservice.
  # ---------------------------------------------------------------------------
  DB_NAME: "wallet_db"