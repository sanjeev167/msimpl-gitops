# =============================================================================
# Kustomization Manifest
# =============================================================================
# File        : kustomization.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Microservice: ms-wallet
# Resource    : Kustomization
#
# Purpose
# -----------------------------------------------------------------------------
# Assembles all Kubernetes resources required to deploy the ms-wallet
# microservice in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This Kustomization combines:
#
# 1. Application runtime resources
#      - Deployment
#      - Service
#
# 2. Environment-specific configuration
#      - ConfigMaps
#      - Secrets
#
# The Deployment and Service are shared across all environments and are
# maintained under:
#
#     kubernetes/applications/ms-wallet
#
# Environment-specific configuration is maintained under:
#
#     kubernetes/environments/dev/ms-wallet
#
# This separation allows the same Deployment to be reused across multiple
# environments while only changing the configuration.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# This Kustomization is referenced by:
#
#     environments/dev/kustomization.yaml
#
# Argo CD automatically builds this Kustomization during synchronization.
#
# Version : 1.0.0
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:

  # ---------------------------------------------------------------------------
  # Shared Runtime Resources
  # ---------------------------------------------------------------------------
  
  - ../environments/dev
  - ../../../applications/ms-wallet

  # ---------------------------------------------------------------------------
  # Environment Configuration
  # ---------------------------------------------------------------------------
  - config-map-common.yaml
  - config-map-db.yaml
  - config-map-kafka.yaml
  - config-map-observability.yaml
  - secret.yaml