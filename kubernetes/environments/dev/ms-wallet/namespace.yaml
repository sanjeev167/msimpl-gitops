# =============================================================================
# Kubernetes Namespace Manifest
# =============================================================================
# File        : namespace.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Resource    : Namespace
#
# Purpose
# -----------------------------------------------------------------------------
# Creates the Kubernetes namespace used by all MSIMPL microservices deployed
# in the Development environment.
#
# Notes
# -----------------------------------------------------------------------------
# This namespace is referenced by:
#
#   • Argo CD Application
#   • Kustomize
#   • Deployments
#   • Services
#   • ConfigMaps
#   • Secrets
#   • Ingress
#
# All namespaced resources deployed by this Kustomization must belong to this
# namespace.
#
# =============================================================================

apiVersion: v1
kind: Namespace

metadata:
  name: msimpl

  labels:
    app.kubernetes.io/name: msimpl
    app.kubernetes.io/part-of: microservices-platform
    app.kubernetes.io/environment: dev