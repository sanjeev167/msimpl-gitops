# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-observability.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-wallet
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores Development environment-specific, non-sensitive observability
# configuration consumed exclusively by the Wallet microservice.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains monitoring and observability configuration required
# by the Wallet microservice during deployment.
#
# Typical configuration includes:
#
#   • Spring Boot Actuator configuration
#   • Health endpoint configuration
#   • Prometheus metrics configuration
#   • Monitoring-related environment variables
#
# Application logging configuration is maintained separately in:
#
#     config-map-common.yaml
#
# This ConfigMap MUST NEVER contain:
#
#   • Monitoring API Keys
#   • Authentication Tokens
#   • SSL Certificates
#   • Encryption Keys
#
# Sensitive information must always be stored in a Kubernetes Secret.
#
# This ConfigMap is referenced by the Wallet Deployment using:
#
#     envFrom:
#       configMapRef:
#         name: ms-wallet-observability-config
#
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This ConfigMap belongs exclusively to the Wallet microservice in the
#   Development environment.
# - It is deployed through the Wallet service Kustomization located at:
#
#       kubernetes/environments/dev/ms-wallet
#
# - Argo CD continuously reconciles this ConfigMap with the desired state
#   stored in the GitOps repository.
# - Never modify this ConfigMap directly inside the Kubernetes cluster.
#   All configuration changes must originate from Git.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Spring Boot Actuator
# - Prometheus
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
#
# Version     : 4.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-wallet-observability-config
  # ---------------------------------------------------------------------------
  name: ms-wallet-observability-config

  labels:

    app.kubernetes.io/name: ms-wallet
    app.kubernetes.io/component: observability-config
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/environment: dev


# -----------------------------------------------------------------------------
# Non-sensitive Observability Configuration
#
# Spring Boot automatically maps these environment variables to the
# corresponding Actuator and Micrometer configuration properties.
# -----------------------------------------------------------------------------
data:

  # ---------------------------------------------------------------------------
  # Spring Boot Actuator Endpoints
  #
  # Exposes health, information and Prometheus metrics endpoints used by
  # Kubernetes readiness/liveness probes and monitoring systems.
  # ---------------------------------------------------------------------------
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"

  # ---------------------------------------------------------------------------
  # Health Endpoint Details
  #
  # Displays detailed health information for monitoring tools.
  # Development uses "always". Production environments may choose
  # "when_authorized" based on security requirements.
  # ---------------------------------------------------------------------------
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"

  # ---------------------------------------------------------------------------
  # Prometheus Metrics Export
  #
  # Enables the Prometheus metrics endpoint:
  #
  #     /actuator/prometheus
  #
  # for metrics collection by Prometheus.
  # ---------------------------------------------------------------------------
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"