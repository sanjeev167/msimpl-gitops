# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-common.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-wallet
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores Development environment-specific, non-sensitive configuration
# consumed exclusively by the Wallet microservice.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains common application configuration required by the
# Wallet microservice during deployment.
#
# Typical examples include:
#
#   • Logging configuration
#   • Feature flags
#   • Default application settings
#   • Environment variables
#
# This ConfigMap MUST NEVER contain:
#
#   • Passwords
#   • API Keys
#   • Authentication Tokens
#   • Certificates
#   • Encryption Keys
#
# Sensitive information must always be stored in a Kubernetes Secret.
#
# This ConfigMap is referenced by the Wallet Deployment using:
#
#     envFrom:
#       configMapRef:
#         name: ms-wallet-common-config
#
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This ConfigMap belongs exclusively to the Wallet microservice in the
#   Development environment.
# - It is deployed through the Wallet service Kustomization located at:
#
#       kubernetes/environments/dev/ms-wallet
#
# - Argo CD continuously reconciles this ConfigMap with the desired state
#   stored in the GitOps repository.
# - Never modify this ConfigMap directly inside the Kubernetes cluster.
#   All configuration changes must originate from Git.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
#
# Version     : 4.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-wallet-common-config
  # ---------------------------------------------------------------------------
  name: ms-wallet-common-config

  labels:

    app.kubernetes.io/name: ms-wallet
    app.kubernetes.io/component: common-config
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/environment: dev


# -----------------------------------------------------------------------------
# Non-sensitive application configuration
# -----------------------------------------------------------------------------
data:

  # ---------------------------------------------------------------------------
  # Root Logging Level
  #
  # Spring Boot automatically maps this environment variable to:
  #
  #     logging.level.root
  # ---------------------------------------------------------------------------
  LOG_LEVEL_ROOT: "INFO"