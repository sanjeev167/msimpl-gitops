# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-kafka.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-wallet
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores Development environment-specific, non-sensitive Apache Kafka
# configuration consumed exclusively by the Wallet microservice.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains the Kafka infrastructure configuration required by
# the Wallet microservice to communicate with the Kafka cluster.
#
# Typical configuration includes:
#
#   • Kafka Bootstrap Host
#   • Kafka Bootstrap Port
#   • Default Consumer Configuration
#   • Default Producer Configuration
#   • Retry Configuration
#
# Service-specific Kafka configuration such as:
#
#   • Topic Names
#   • Consumer Groups
#   • Spring Cloud Stream Bindings
#   • Serialization Configuration
#
# remains inside the Wallet application configuration and references these
# environment variables where required.
#
# This ConfigMap MUST NEVER contain:
#
#   • SASL Username
#   • SASL Password
#   • SSL Certificates
#   • Authentication Tokens
#
# Sensitive information must always be stored in a Kubernetes Secret.
#
# This ConfigMap is referenced by the Wallet Deployment using:
#
#     envFrom:
#       configMapRef:
#         name: ms-wallet-kafka-config
#
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This ConfigMap belongs exclusively to the Wallet microservice in the
#   Development environment.
# - It is deployed through the Wallet service Kustomization located at:
#
#       kubernetes/environments/dev/ms-wallet
#
# - Argo CD continuously reconciles this ConfigMap with the desired state
#   stored in the GitOps repository.
# - Never modify this ConfigMap directly inside the Kubernetes cluster.
#   All configuration changes must originate from Git.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Apache Kafka
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
#
# Version     : 4.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-wallet-kafka-config
  # ---------------------------------------------------------------------------
  name: ms-wallet-kafka-config

  labels:

    app.kubernetes.io/name: ms-wallet
    app.kubernetes.io/component: kafka-config
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/environment: dev


# -----------------------------------------------------------------------------
# Non-sensitive Apache Kafka Configuration
#
# Spring Boot automatically maps these environment variables to the
# corresponding Kafka configuration properties.
# -----------------------------------------------------------------------------
data:

  # ---------------------------------------------------------------------------
  # Kafka Bootstrap Host
  #
  # Development
  # ---------------------------------------------------------------------------
  # host.docker.internal resolves to the Docker Desktop host where the Kafka
  # broker is currently running.
  #
  # QA / UAT / Production
  # ---------------------------------------------------------------------------
  # Replace this value with the Kafka Service DNS name or bootstrap broker
  # address appropriate for the target environment.
  # ---------------------------------------------------------------------------
  KAFKA_HOST: "host.docker.internal"

  # ---------------------------------------------------------------------------
  # Kafka Bootstrap Port
  # ---------------------------------------------------------------------------
  KAFKA_PORT: "9092"

  # ---------------------------------------------------------------------------
  # Default Consumer Configuration
  # ---------------------------------------------------------------------------
  KAFKA_AUTO_OFFSET_RESET: "earliest"

  KAFKA_ENABLE_AUTO_COMMIT: "false"

  # ---------------------------------------------------------------------------
  # Default Producer Configuration
  # ---------------------------------------------------------------------------
  KAFKA_ACKS: "all"

  KAFKA_RETRIES: "3"