# =============================================================================
# Kubernetes Secret Manifest
# =============================================================================
# File        : secret.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-wallet
# Resource    : Secret (Opaque)
#
# Purpose
# -----------------------------------------------------------------------------
# Stores environment-specific sensitive configuration for the Wallet
# microservice used in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This Secret contains confidential configuration consumed only by the
# Wallet microservice.
#
# Typical examples include:
#
#   • Database Username
#   • Database Password
#   • API Keys
#   • Authentication Tokens
#   • Encryption Keys
#   • Third-party Credentials
#
# This Secret is referenced by the Wallet Deployment using:
#
#     envFrom:
#       secretRef:
#         name: ms-wallet-secret
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This Secret belongs to the Development environment.
# - Placeholder credentials are acceptable for local development.
# - QA, UAT and Production must use environment-specific credentials.
# - For production environments, consider using an external Secret
#   management solution such as AWS Secrets Manager, HashiCorp Vault or
#   External Secrets Operator.
#
# Security Notes
# -----------------------------------------------------------------------------
# - stringData is automatically converted into Base64-encoded data by
#   Kubernetes.
# - Base64 is NOT encryption.
# - Restrict RBAC permissions so only authorized workloads and users can
#   access this Secret.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 2.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: Secret

metadata:

  # ---------------------------------------------------------------------------
  # Secret Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     secretRef:
  #       name: ms-wallet-secret
  # ---------------------------------------------------------------------------
  name: ms-wallet-secret

  labels:

    app.kubernetes.io/name: ms-wallet
    app.kubernetes.io/component: application-secret
    app.kubernetes.io/part-of: msimpl-platform
    

# -----------------------------------------------------------------------------
# Secret Type
#
# Opaque is the default Secret type for user-defined key/value pairs.
# -----------------------------------------------------------------------------
type: Opaque

# -----------------------------------------------------------------------------
# stringData
#
# Kubernetes automatically converts these values into the 'data' section
# using Base64 encoding during resource creation.
#
# stringData is preferred because it is human-readable and easier to maintain.
# -----------------------------------------------------------------------------
stringData:

  # ---------------------------------------------------------------------------
  # Database Credentials
  #
  # Spring Boot reads these values as environment variables.
  # ---------------------------------------------------------------------------
  DB_USERNAME: "postgres"

  DB_PASSWORD: "postgres"