# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-observability.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-transaction-orchestrator
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores environment-specific, non-sensitive observability configuration for
# the Transaction Orchestrator microservice used in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains monitoring and observability configuration consumed
# by the Transaction Orchestrator microservice.
#
# Typical configuration includes:
#
#   • Spring Boot Actuator configuration
#   • Health endpoint configuration
#   • Prometheus metrics configuration
#   • Monitoring-related environment variables
#
# Logging configuration is maintained separately in:
#
#     config-map-common.yaml
#
# This ConfigMap must NEVER contain:
#
#   • Monitoring API Keys
#   • Authentication Tokens
#   • SSL Certificates
#
# Sensitive information must be stored in Kubernetes Secrets.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This ConfigMap belongs to the Development environment.
# - Argo CD continuously reconciles this resource with the desired
#   state stored in Git.
# - Never edit this ConfigMap directly inside the Kubernetes cluster.
#   All changes must originate from Git.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Spring Boot Actuator
# - Prometheus
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-transaction-observability-config
  # ---------------------------------------------------------------------------
  name: ms-transaction-observability-config

  labels:

    app.kubernetes.io/name: ms-transaction-orchestrator
    app.kubernetes.io/component: observability-config
    app.kubernetes.io/part-of: msimpl-platform
   

data:

  # ---------------------------------------------------------------------------
  # Spring Boot Actuator
  #
  # Exposes health, information and Prometheus metrics endpoints used by
  # Kubernetes probes and monitoring tools.
  # ---------------------------------------------------------------------------
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"

  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"

  # ---------------------------------------------------------------------------
  # Prometheus Metrics
  #
  # Enables the Prometheus metrics endpoint:
  #
  #     /actuator/prometheus
  #
  # for metrics collection.
  # ---------------------------------------------------------------------------
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"