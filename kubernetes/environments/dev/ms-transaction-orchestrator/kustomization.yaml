# =============================================================================
# Kustomization Manifest
# =============================================================================
# File        : kustomization.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Microservice: ms-transaction-orchestrator
# Resource    : Kustomization
#
# Purpose
# -----------------------------------------------------------------------------
# Assembles all Kubernetes resources required to deploy the
# Transaction Orchestrator microservice in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This environment-specific Kustomization combines the shared application
# manifests with the Development environment configuration.
#
# Shared application resources:
#
#   • Deployment
#   • Service
#
# Development-specific resources:
#
#   • Ingress
#   • ConfigMaps
#   • Secret
#
# The shared application manifests are maintained under:
#
#     kubernetes/applications/ms-transaction-orchestrator
#
# Environment-specific configuration is maintained under:
#
#     kubernetes/environments/dev/ms-transaction-orchestrator
#
# This separation enables the same application manifests to be reused across
# Development, QA, UAT, and Production while allowing each environment to
# provide its own configuration.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# • This Kustomization is referenced by:
#
#       kubernetes/environments/dev/kustomization.yaml
#
# • During synchronization, Argo CD uses Kustomize to build the complete set
#   of Kubernetes resources before applying them to the target cluster.
#
# • The resulting deployment follows the App of Apps GitOps architecture used
#   throughout the MSIMPL platform.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Kustomize
# - Argo CD
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
#
# Version     : 2.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:

  # ---------------------------------------------------------------------------
  # Shared application manifests
  # ---------------------------------------------------------------------------
  - ../../../applications/ms-transaction-orchestrator

  # ---------------------------------------------------------------------------
  # Development environment configuration
  # ---------------------------------------------------------------------------
  - ingress.yaml
  - config-map-common.yaml
  - config-map-db.yaml
  - config-map-kafka.yaml
  - config-map-observability.yaml
  - secret.yaml