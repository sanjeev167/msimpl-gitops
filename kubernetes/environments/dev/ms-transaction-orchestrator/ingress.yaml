# =============================================================================
# Kubernetes Ingress Manifest
# =============================================================================
# File        : ingress.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-transaction-orchestrator
# Resource    : Ingress (NGINX)
#
# Purpose
# -----------------------------------------------------------------------------
# Exposes the Transaction Orchestrator microservice to external clients through
# the NGINX Ingress Controller in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This Ingress provides external access to the Transaction Orchestrator
# microservice during Development.
#
# Incoming client requests matching the '/transaction' path are received by
# the NGINX Ingress Controller and forwarded to the internal
# ms-transaction-orchestrator ClusterIP Service.
#
# Each MSIMPL microservice owns its own Ingress resource, enabling
# independent deployment and configuration while following the GitOps model.
#
#
# Development URL
# -----------------------------------------------------------------------------
#
#     https://api.msimpl.local/transaction
#
#
# Responsibilities
# -----------------------------------------------------------------------------
# • Receives external requests for the Transaction Orchestrator API.
# • Performs path-based routing for the '/transaction' endpoint.
# • Routes requests to the internal ClusterIP Service.
# • Provides external access to the Transaction Orchestrator microservice
#   during Development.
#
#
# Request Flow
# -----------------------------------------------------------------------------
#
# Browser / Postman
#         │
#         ▼
# https://api.msimpl.local/transaction
#         │
#         ▼
# NGINX Ingress Controller
#         │
#         ▼
# ms-transaction-orchestrator Service
#         │
#         ▼
# Transaction Orchestrator Pod(s)
#
#
# GitOps Notes
# -----------------------------------------------------------------------------
# • This Ingress belongs exclusively to the Transaction Orchestrator
#   microservice.
# • Managed by Argo CD through the GitOps workflow.
# • Never modify this resource directly inside the Kubernetes cluster.
# • All changes must originate from the GitOps repository.
#
#
# Environment Endpoints
# -----------------------------------------------------------------------------
#
# Development
#     https://api.msimpl.local/transaction
#
# QA
#     https://api.qa.msimpl.company.com/transaction
#
# UAT
#     https://api.uat.msimpl.company.com/transaction
#
# Production
#     https://api.msimpl.company.com/transaction
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - NGINX Ingress Controller
# - GitHub Actions
# - Argo CD
#
# Version     : 3.2.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:

  # ---------------------------------------------------------------------------
  # Ingress Resource Name
  # ---------------------------------------------------------------------------
  name: ms-transaction-orchestrator-ingress

  labels:

    app.kubernetes.io/name: ms-transaction-orchestrator
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/managed-by: argocd

spec:

  # ---------------------------------------------------------------------------
  # NGINX Ingress Controller
  # ---------------------------------------------------------------------------
  ingressClassName: nginx

  rules:

    # -------------------------------------------------------------------------
    # Development Host
    # -------------------------------------------------------------------------
    - host: api.msimpl.local

      http:

        paths:

          # -------------------------------------------------------------------
          # Transaction Orchestrator API
          # -------------------------------------------------------------------
          - path: /transaction
            pathType: Prefix

            backend:
              service:
                name: ms-transaction-orchestrator
                port:
                  number: 8082