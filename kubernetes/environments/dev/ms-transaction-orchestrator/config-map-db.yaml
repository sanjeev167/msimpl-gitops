# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-db.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-transaction-orchestrator
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores environment-specific, non-sensitive database configuration for the
# Transaction Orchestrator microservice used in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains database connection properties consumed exclusively
# by the Transaction Orchestrator microservice.
#
# Typical examples include:
#
#   • Database Host
#   • Database Port
#   • Database Name
#
# This ConfigMap must NEVER contain:
#
#   • Database Username
#   • Database Password
#   • SSL Certificates
#   • Database Tokens
#
# Sensitive information must always be stored in Kubernetes Secrets.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# • This ConfigMap is specific to the Development environment.
# • It belongs exclusively to the Transaction Orchestrator microservice.
# • Argo CD continuously reconciles this resource with the desired state
#   stored in the GitOps repository.
# • Never modify this ConfigMap directly in the Kubernetes cluster.
# • All changes must originate from the GitOps repository.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-transaction-db-config
  # ---------------------------------------------------------------------------
  name: ms-transaction-db-config

  labels:

    app.kubernetes.io/name: ms-transaction-orchestrator
    app.kubernetes.io/component: database-config
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/managed-by: argocd

data:

  # ---------------------------------------------------------------------------
  # Database Host
  #
  # Hostname or IP address of the PostgreSQL server.
  # ---------------------------------------------------------------------------
  DB_HOST: "host.docker.internal"

  # ---------------------------------------------------------------------------
  # Database Port
  #
  # Default PostgreSQL server port.
  # ---------------------------------------------------------------------------
  DB_PORT: "5432"

  # ---------------------------------------------------------------------------
  # Database Name
  #
  # Transaction Orchestrator database used in the Development environment.
  # ---------------------------------------------------------------------------
  DB_NAME: "orchestrator_db"