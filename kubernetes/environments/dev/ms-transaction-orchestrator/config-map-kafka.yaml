# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-kafka.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-transaction-orchestrator
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores environment-specific, non-sensitive Apache Kafka configuration for the
# Transaction Orchestrator microservice used in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains Kafka connection properties and default client
# configuration consumed exclusively by the Transaction Orchestrator
# microservice.
#
# Typical configuration includes:
#
#   • Kafka Bootstrap Host
#   • Kafka Bootstrap Port
#   • Consumer Defaults
#   • Producer Defaults
#   • Retry Configuration
#
# Service-specific Kafka configuration such as:
#
#   • Topic Names
#   • Consumer Groups
#   • Function Bindings
#   • Serialization Configuration
#
# remains within the Transaction Orchestrator application and references these
# environment variables where required.
#
# This ConfigMap must NEVER contain:
#
#   • SASL Username
#   • SASL Password
#   • SSL Certificates
#   • Authentication Tokens
#
# Sensitive information must always be stored in Kubernetes Secrets.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# • This ConfigMap is specific to the Development environment.
# • It belongs exclusively to the Transaction Orchestrator microservice.
# • Argo CD continuously reconciles this resource with the desired state
#   stored in the GitOps repository.
# • Never modify this ConfigMap directly in the Kubernetes cluster.
# • All changes must originate from the GitOps repository.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Apache Kafka
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-transaction-kafka-config
  # ---------------------------------------------------------------------------
  name: ms-transaction-kafka-config

  labels:

    app.kubernetes.io/name: ms-transaction-orchestrator
    app.kubernetes.io/component: kafka-config
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/managed-by: argocd

data:

  # ---------------------------------------------------------------------------
  # Kafka Bootstrap Host
  #
  # Development
  # -----------
  # 'host.docker.internal' resolves to the Docker host where Apache Kafka is
  # running for local development.
  #
  # QA / UAT / Production
  # ---------------------
  # Replace this value with the Kafka bootstrap service or broker endpoint
  # appropriate for the target environment.
  # ---------------------------------------------------------------------------
  KAFKA_HOST: "host.docker.internal"

  # ---------------------------------------------------------------------------
  # Kafka Bootstrap Port
  # ---------------------------------------------------------------------------
  KAFKA_PORT: "9092"

  # ---------------------------------------------------------------------------
  # Default Consumer Configuration
  # ---------------------------------------------------------------------------
  KAFKA_AUTO_OFFSET_RESET: "earliest"

  KAFKA_ENABLE_AUTO_COMMIT: "false"

  # ---------------------------------------------------------------------------
  # Default Producer Configuration
  # ---------------------------------------------------------------------------
  KAFKA_ACKS: "all"

  KAFKA_RETRIES: "3"