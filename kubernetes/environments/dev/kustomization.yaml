# =============================================================================
# Kustomization Manifest
# =============================================================================
# File        : kustomization.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Resource    : Kustomization
#
# Purpose
# -----------------------------------------------------------------------------
# Defines all Kubernetes resources required to deploy the MSIMPL platform in
# the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This Kustomization is the deployment entry point for the Development
# environment. It assembles all shared environment resources and delegates the
# deployment of each microservice to its own Kustomization.
#
# Responsibilities
# -----------------------------------------------------------------------------
# - Applies the Development namespace.
# - Applies common labels to all resources.
# - Deploys the shared Ingress.
# - Deploys all Development environment microservices.
# - Serves as the deployment entry point for Argo CD.
#
# Repository Design
# -----------------------------------------------------------------------------
# Each microservice under this environment contains its own kustomization.yaml.
#
# Example:
#
#   environments/dev/ms-wallet/kustomization.yaml
#
# That Kustomization combines:
#
#   - Shared runtime resources
#       applications/ms-wallet/deployment.yaml
#       applications/ms-wallet/service.yaml
#
#   - Environment-specific resources
#       ConfigMaps
#       Secrets
#
# This layered structure keeps application manifests independent from
# environment-specific configuration while allowing Argo CD and Kustomize to
# assemble the complete deployment automatically.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - Argo CD synchronizes this Kustomization from Git.
# - All Development environment changes must originate from Git.
# - New microservices should be added only to the resources section.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Kustomize
# - Argo CD
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
#
# Version     : 4.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# -----------------------------------------------------------------------------
# Namespace
#
# Applied automatically to all namespaced resources.
# -----------------------------------------------------------------------------
namespace: msimpl

# -----------------------------------------------------------------------------
# Common Labels
#
# Applied automatically to every resource assembled by this Kustomization.
# -----------------------------------------------------------------------------
labels:
  - pairs:
      app.kubernetes.io/part-of: msimpl-platform
      app.kubernetes.io/environment: dev

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:

  # ---------------------------------------------------------------------------
  # Shared Environment Resources
  # ---------------------------------------------------------------------------
  - namespace/namespace.yaml
  - ingress/ingress.yaml

  