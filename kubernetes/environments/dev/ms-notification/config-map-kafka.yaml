# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-kafka.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-notification
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores environment-specific, non-sensitive Apache Kafka configuration for the
# Notification microservice used in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains Kafka configuration consumed by the Notification
# microservice.
#
# Typical configuration includes:
#
#   • Kafka Bootstrap Server
#   • Consumer defaults
#   • Producer defaults
#   • Retry configuration
#
# Service-specific Kafka settings such as:
#
#   • Topic names
#   • Consumer groups
#   • Function bindings
#   • Serialization configuration
#
# are configured within the Notification microservice and may reference these
# environment variables.
#
# This ConfigMap must NEVER contain:
#
#   • SASL Username
#   • SASL Password
#   • SSL Certificates
#   • Authentication Secrets
#
# Sensitive Kafka credentials must be stored in Kubernetes Secrets.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This ConfigMap belongs to the Development environment.
# - Argo CD continuously reconciles this resource with the desired
#   state stored in Git.
# - Never edit this ConfigMap directly inside the Kubernetes cluster.
#   All changes must originate from Git.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Apache Kafka
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-notification-kafka-config
  # ---------------------------------------------------------------------------
  name: ms-notification-kafka-config

  labels:

    app.kubernetes.io/name: ms-notification
    app.kubernetes.io/component: kafka-config
    app.kubernetes.io/part-of: msimpl-platform
    

data:

  # ---------------------------------------------------------------------------
  # Kafka Bootstrap Server
  #
  # Spring Boot constructs the bootstrap server as:
  #
  # ${KAFKA_HOST}:${KAFKA_PORT}
  # ---------------------------------------------------------------------------
  KAFKA_HOST: "host.docker.internal"

  KAFKA_PORT: "9092"

  # ---------------------------------------------------------------------------
  # Consumer Configuration
  # ---------------------------------------------------------------------------
  KAFKA_AUTO_OFFSET_RESET: "earliest"

  KAFKA_ENABLE_AUTO_COMMIT: "false"

  # ---------------------------------------------------------------------------
  # Producer Configuration
  # ---------------------------------------------------------------------------
  KAFKA_ACKS: "all"

  KAFKA_RETRIES: "3"