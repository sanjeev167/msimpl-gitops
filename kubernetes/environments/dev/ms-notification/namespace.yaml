# =============================================================================
# Kubernetes Namespace Manifest
# =============================================================================
# File        : namespace.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Resource    : Namespace
#
# Purpose
# -----------------------------------------------------------------------------
# Creates the Kubernetes namespace used by all MSIMPL microservices deployed
# in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# A Namespace provides logical isolation within a Kubernetes cluster.
#
# All Development resources for the MSIMPL platform are deployed into this
# namespace, including:
#
#   • Deployments
#   • Services
#   • ConfigMaps
#   • Secrets
#   • Ingresses
#   • Persistent Volume Claims (where applicable)
#
# The namespace is shared by all MSIMPL microservices running in the
# Development environment, allowing them to communicate using Kubernetes
# Service Discovery while remaining isolated from other environments.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This Namespace is managed through the MSIMPL GitOps repository.
# - Argo CD reconciles this Namespace with the desired state stored in Git.
# - The Notification environment Kustomization includes this Namespace
#   manifest during deployment.
# - If the Namespace already exists, Kubernetes simply reconciles its state.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: Namespace

metadata:

  # ---------------------------------------------------------------------------
  # Namespace Name
  #
  # Shared namespace for all MSIMPL microservices deployed in the
  # Development environment.
  # ---------------------------------------------------------------------------
  name: msimpl

  labels:

    # -------------------------------------------------------------------------
    # Standard Kubernetes Labels
    # -------------------------------------------------------------------------
    app.kubernetes.io/name: msimpl
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/environment: dev