# =============================================================================
# Kubernetes ConfigMap Manifest
# =============================================================================
# File        : config-map-common.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-notification
# Resource    : ConfigMap
#
# Purpose
# -----------------------------------------------------------------------------
# Stores environment-specific, non-sensitive configuration for the
# Notification microservice used in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This ConfigMap contains common application configuration consumed by the
# Notification microservice.
#
# Typical examples include:
#
#   • Logging configuration
#   • Feature flags
#   • Default application settings
#   • Environment variables
#
# This ConfigMap must NEVER contain:
#
#   • Passwords
#   • API Keys
#   • Tokens
#   • Certificates
#
# Sensitive information must be stored in Kubernetes Secrets.
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This ConfigMap belongs to the Development environment.
# - Argo CD continuously reconciles this resource with the desired
#   state stored in Git.
# - Never edit this ConfigMap directly inside the Kubernetes cluster.
#   All changes must originate from Git.
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:

  # ---------------------------------------------------------------------------
  # ConfigMap Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     configMapRef:
  #       name: ms-notification-common-config
  # ---------------------------------------------------------------------------
  name: ms-notification-common-config

  labels:

    app.kubernetes.io/name: ms-notification
    app.kubernetes.io/component: common-config
    app.kubernetes.io/part-of: msimpl-platform
   

data:

  # ---------------------------------------------------------------------------
  # Default Root Logging Level
  #
  # Spring Boot automatically maps this environment variable to:
  #
  # logging.level.root
  # ---------------------------------------------------------------------------
  LOG_LEVEL_ROOT: "INFO"