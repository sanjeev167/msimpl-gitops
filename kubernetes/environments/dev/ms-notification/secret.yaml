# =============================================================================
# Kubernetes Secret Manifest
# =============================================================================
# File        : secret.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-notification
# Resource    : Secret (Opaque)
#
# Purpose
# -----------------------------------------------------------------------------
# Stores Development environment-specific sensitive configuration consumed
# exclusively by the Notification microservice.
#
# Description
# -----------------------------------------------------------------------------
# This Secret contains confidential configuration required by the
# Notification microservice during deployment.
#
# Typical examples include:
#
#   • Database Username
#   • Database Password
#   • API Keys
#   • Authentication Tokens
#   • Encryption Keys
#   • Third-party Credentials
#
# This Secret is referenced by the Notification Deployment using:
#
#     envFrom:
#       secretRef:
#         name: ms-notification-secret
#
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This Secret belongs exclusively to the Notification microservice in the
#   Development environment.
# - It is deployed through the Notification service Kustomization located at:
#
#       kubernetes/environments/dev/ms-notification
#
# - Placeholder credentials are acceptable for local development.
# - QA, UAT and Production must use environment-specific credentials.
# - For production environments, consider using an external Secret
#   management solution such as AWS Secrets Manager, HashiCorp Vault or
#   External Secrets Operator.
#
#
# Security Notes
# -----------------------------------------------------------------------------
# - stringData is automatically converted into Base64-encoded data by
#   Kubernetes.
# - Base64 is NOT encryption.
# - Restrict RBAC permissions so only authorized workloads and users can
#   access this Secret.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
#
# Version     : 4.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: v1
kind: Secret

metadata:

  # ---------------------------------------------------------------------------
  # Secret Name
  #
  # Referenced by:
  #
  # Deployment
  #   envFrom:
  #     secretRef:
  #       name: ms-notification-secret
  # ---------------------------------------------------------------------------
  name: ms-notification-secret

  labels:

    app.kubernetes.io/name: ms-notification
    app.kubernetes.io/component: application-secret
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/environment: dev


# -----------------------------------------------------------------------------
# Secret Type
#
# Opaque is the default Secret type for user-defined key/value pairs.
# -----------------------------------------------------------------------------
type: Opaque

# -----------------------------------------------------------------------------
# Sensitive Configuration
#
# Kubernetes automatically converts stringData into Base64-encoded values.
# -----------------------------------------------------------------------------
stringData:

  # ---------------------------------------------------------------------------
  # Database Credentials
  #
  # Spring Boot reads these values as environment variables.
  # ---------------------------------------------------------------------------
  DB_USERNAME: "postgres"

  DB_PASSWORD: "postgres"