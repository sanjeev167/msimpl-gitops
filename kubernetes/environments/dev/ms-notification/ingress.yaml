# =============================================================================
# Kubernetes Ingress Manifest
# =============================================================================
# File        : ingress.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Service     : ms-notification
# Resource    : Ingress (NGINX)
#
# Purpose
# -----------------------------------------------------------------------------
# Exposes the Notification microservice through the NGINX Ingress Controller
# in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This Ingress provides external HTTP access to the Notification
# microservice.
#
# Client requests matching the Notification path are routed through the
# NGINX Ingress Controller to the internal Notification Kubernetes Service.
#
#
# Development URL
# -----------------------------------------------------------------------------
#
# https://api.msimpl.local/notification
#
#
# Request Flow
# -----------------------------------------------------------------------------
#
# Browser / Postman
#         │
#         ▼
# https://api.msimpl.local/notification
#         │
#         ▼
# NGINX Ingress Controller
#         │
#         ▼
# ms-notification-service
#         │
#         ▼
# Notification Pods
#
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This Ingress belongs exclusively to the Notification microservice in the
#   Development environment.
# - It is deployed through the Notification service Kustomization located at:
#
#       kubernetes/environments/dev/ms-notification
#
# - Managed by Argo CD through GitOps.
# - Never modify this Ingress directly inside Kubernetes.
#   All changes must originate from the Git repository.
#
#
# Compatible With
# -----------------------------------------------------------------------------
# - NGINX Ingress Controller
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
#
# Version     : 4.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:

  # ---------------------------------------------------------------------------
  # Ingress Name
  # ---------------------------------------------------------------------------
  name: ms-notification-ingress

  labels:

    app.kubernetes.io/name: ms-notification
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: msimpl-platform
    app.kubernetes.io/environment: dev

spec:

  ingressClassName: nginx

  rules:

    # -------------------------------------------------------------------------
    # Development API Host
    # -------------------------------------------------------------------------
    - host: api.msimpl.local

      http:

        paths:

          # -------------------------------------------------------------------
          # Notification Service
          # -------------------------------------------------------------------
          - path: /notification
            pathType: Prefix

            backend:

              service:

                name: ms-notification-service

                port:
                  number: 8081