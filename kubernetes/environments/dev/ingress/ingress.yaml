# =============================================================================
# Kubernetes Ingress Manifest
# =============================================================================
# File        : ingress.yaml
# Project     : MSIMPL - Microservices Platform
# Environment : Development (Dev)
# Resource    : Ingress (NGINX)
#
# Purpose
# -----------------------------------------------------------------------------
# Exposes MSIMPL microservices to external clients through the NGINX Ingress
# Controller in the Development environment.
#
# Description
# -----------------------------------------------------------------------------
# This Ingress acts as the single entry point into the MSIMPL platform during
# Development.
#
# Responsibilities
# -----------------------------------------------------------------------------
# - Receives external HTTP requests.
# - Performs path-based routing.
# - Forwards requests to internal ClusterIP Services.
# - Provides a single endpoint for all MSIMPL microservices.
#
# Request Flow
# -----------------------------------------------------------------------------
#
# Browser / Postman
#         │
#         ▼
#      localhost
#         │
#         ▼
#  NGINX Ingress Controller
#         │
#         ├────────────► /wallet
#         │                  │
#         │                  ▼
#         │            ms-wallet Service
#         │
#         ├────────────► /notification
#         │                  │
#         │                  ▼
#         │        ms-notification Service
#         │
#         └────────────► /transaction
#                            │
#                            ▼
#              ms-transaction-orchestrator Service
#
# GitOps Notes
# -----------------------------------------------------------------------------
# - This Ingress belongs to the Development environment.
# - Argo CD continuously reconciles this resource with the desired
#   state stored in Git.
# - Never edit this Ingress directly inside the Kubernetes cluster.
#   All changes must originate from Git.
# - This Ingress is shared by all MSIMPL microservices.
#
# Compatible With
# -----------------------------------------------------------------------------
# - NGINX Ingress Controller
# - Docker Desktop Kubernetes
# - Kind
# - Amazon EKS
# - GitHub Actions
# - Argo CD
#
# Version     : 3.0.0 (LOCKED)
# Author      : Sanjeev Kumar
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:

  name: msimpl-ingress

  labels:

    app.kubernetes.io/name: msimpl-ingress
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: msimpl-platform
   

spec:

  # ---------------------------------------------------------------------------
  # Use the NGINX Ingress Controller.
  # ---------------------------------------------------------------------------
  ingressClassName: nginx

  rules:

    # -------------------------------------------------------------------------
    # Development host.
    #
    # For local Kubernetes the host is localhost.
    #
    # QA/UAT/Production overlays should replace this with the appropriate
    # DNS name (for example: api.msimpl.com).
    # -------------------------------------------------------------------------
    - host: localhost

      http:

        paths:

          # -------------------------------------------------------------------
          # Wallet Service
          # -------------------------------------------------------------------
          - path: /wallet
            pathType: Prefix

            backend:
              service:
                name: ms-wallet
                port:
                  number: 8080

          # -------------------------------------------------------------------
          # Notification Service
          # -------------------------------------------------------------------
          - path: /notification
            pathType: Prefix

            backend:
              service:
                name: ms-notification
                port:
                  number: 8081

          # -------------------------------------------------------------------
          # Transaction Orchestrator Service
          # -------------------------------------------------------------------
          - path: /transaction
            pathType: Prefix

            backend:
              service:
                name: ms-transaction-orchestrator
                port:
                  number: 8082