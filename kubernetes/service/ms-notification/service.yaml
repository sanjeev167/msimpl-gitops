# =============================================================================
# Kubernetes Service
# =============================================================================
# File        : ms-notification-service.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-notification
# Namespace   : msimpl
# Purpose     : Exposes the Notification microservice within the Kubernetes
#               cluster using a ClusterIP Service.
# Version     : 1.0.0
# =============================================================================
#
# Notes
# -----
# - Internal service accessible only within the Kubernetes cluster.
# - Uses Kubernetes DNS for service discovery.
# - Compatible with GitHub Actions, Argo CD and AWS EKS.
#
# =============================================================================

apiVersion: v1
kind: Service

metadata:

  name: ms-notification

  namespace: msimpl

  labels:
    app: ms-notification

spec:

  type: ClusterIP

  selector:
    app: ms-notification

  ports:

    - protocol: TCP

      port: 8081

      targetPort: 8081