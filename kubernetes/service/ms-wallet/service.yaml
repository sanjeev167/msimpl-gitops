# =============================================================================
# Kubernetes Service
# =============================================================================
# File        : ms-wallet-service.yaml
# Project     : MSIMPL - Microservices Platform
# Service     : ms-wallet
# Namespace   : msimpl
# Purpose     : Exposes the Wallet microservice within the Kubernetes cluster
#               using a ClusterIP Service.
# Version     : 1.0.0
# =============================================================================
#
# Notes
# -----
# - Internal service accessible only within the Kubernetes cluster.
# - Uses Kubernetes DNS for service discovery.
# - Compatible with GitHub Actions, Argo CD and AWS EKS.
#
# =============================================================================

apiVersion: v1
kind: Service

metadata:
  name: ms-wallet
  namespace: msimpl

  labels:
    app: ms-wallet

spec:
  type: ClusterIP

  selector:
    app: ms-wallet

  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080